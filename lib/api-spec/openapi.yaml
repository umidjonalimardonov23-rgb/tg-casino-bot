openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: players
  - name: game
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players/sync:
    post:
      operationId: syncPlayer
      tags: [players]
      summary: Sync player from Telegram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPlayerBody"
      responses:
        "200":
          description: Player synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{telegramId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player profile
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /players/{telegramId}/deposit:
    post:
      operationId: deposit
      tags: [players]
      summary: Deposit balance
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionBody"
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{telegramId}/withdraw:
    post:
      operationId: withdraw
      tags: [players]
      summary: Withdraw balance
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionBody"
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "400":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /players/{telegramId}/bet:
    post:
      operationId: placeBet
      tags: [players]
      summary: Place a bet and update balance
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetBody"
      responses:
        "200":
          description: Bet result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetResult"
        "400":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /players/{telegramId}/transactions:
    get:
      operationId: getTransactions
      tags: [players]
      summary: Get transaction history
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /game/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [game]
      summary: Get top leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /game/stats:
    get:
      operationId: getGameStats
      tags: [game]
      summary: Get global stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SyncPlayerBody:
      type: object
      properties:
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
      required: [telegramId, firstName]

    Player:
      type: object
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: ["string", "null"]
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        balance:
          type: integer
        totalWon:
          type: integer
        totalLost:
          type: integer
        gamesPlayed:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, telegramId, firstName, balance, totalWon, totalLost, gamesPlayed, createdAt, updatedAt]

    TransactionBody:
      type: object
      properties:
        amount:
          type: integer
      required: [amount]

    BetBody:
      type: object
      properties:
        amount:
          type: integer
        game:
          type: string
        won:
          type: boolean
        winAmount:
          type: integer
      required: [amount, game, won, winAmount]

    BetResult:
      type: object
      properties:
        balance:
          type: integer
        won:
          type: boolean
        winAmount:
          type: integer
        netChange:
          type: integer
      required: [balance, won, winAmount, netChange]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        amount:
          type: integer
        game:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, type, amount, createdAt]

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        telegramId:
          type: string
        username:
          type: ["string", "null"]
        firstName:
          type: string
        balance:
          type: integer
        gamesPlayed:
          type: integer
        totalWon:
          type: integer
      required: [rank, telegramId, firstName, balance, gamesPlayed, totalWon]

    GameStats:
      type: object
      properties:
        totalPlayers:
          type: integer
        totalGamesPlayed:
          type: integer
        biggestWin:
          type: integer
        topPlayer:
          type: ["string", "null"]
      required: [totalPlayers, totalGamesPlayed, biggestWin]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
