[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/tg-game run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.healthchecks]]
type = "http"
path = "/api/health"
