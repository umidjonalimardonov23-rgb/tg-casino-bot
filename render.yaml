services:
  - type: web
    name: tg-game-bot
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CARD_NUMBER
        sync: false
      - key: CARD_HOLDER
        sync: false
      - key: CHANNEL_INVITE
        sync: false
      - key: CHANNEL_ID
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: tg-game-db
          property: connectionString

databases:
  - name: tg-game-db
    databaseName: tgamebot
    user: tgameuser
    region: frankfurt
    plan: free
